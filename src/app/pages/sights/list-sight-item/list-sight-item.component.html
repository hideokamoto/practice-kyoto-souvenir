<ion-item [detail]="true" *ngIf="sight" [routerLink]="'/sights/' + sight.id" button>
  <div class="letter-thumb" [class.visited]="isVisited" slot="start">{{ sight.name | slice:0:1 }}</div>
  <ion-label class="ion-text-wrap">
    <h3>{{ sight.name }}</h3>
    <p>{{ sight.name_kana }}</p>
    <p>{{ sight.description | truncate:60 }}</p>
  </ion-label>
  <ion-icon *ngIf="isFavorite" name="heart" slot="end" color="primary" style="font-size:16px;"></ion-icon>
</ion-item>
