<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>お気に入り</ion-title>
    <ion-buttons slot="end">
      <ion-button [routerLink]="['/about']">
        <ion-icon name="information-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">お気に入り</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-toolbar>
    <ion-searchbar placeholder="場所を検索" show-clear-button="focus" [(ngModel)]="searchQuery"></ion-searchbar>
  </ion-toolbar>

  <ion-segment [value]="favSegment" (ionChange)="onFavSegmentChange($event)" style="margin: 4px 16px 8px;">
    <ion-segment-button value="all">
      <ion-label>すべて ({{ favoriteItems.length }})</ion-label>
    </ion-segment-button>
    <ion-segment-button value="sights">
      <ion-label>観光地</ion-label>
    </ion-segment-button>
    <ion-segment-button value="souvenirs">
      <ion-label>お土産</ion-label>
    </ion-segment-button>
  </ion-segment>

  <!-- Empty state -->
  <div *ngIf="!loading && filteredFavorites.length === 0" class="editorial-empty">
    <ion-icon name="heart-outline" class="ico"></ion-icon>
    <h3>{{ favoriteItems.length === 0 ? 'お気に入りはまだありません' : '条件に一致する項目がありません' }}</h3>
    <p *ngIf="favoriteItems.length === 0">観光地やお土産の詳細ページでハートアイコンをタップして追加できます</p>
    <ion-button *ngIf="favoriteItems.length === 0" expand="block" fill="outline" size="small" routerLink="/tabs/discover" style="margin-top:16px;">
      <ion-icon slot="start" name="compass-outline"></ion-icon>
      発見ページへ
    </ion-button>
  </div>

  <!-- Favorites list -->
  <ion-list *ngIf="!loading && filteredFavorites.length > 0">
    <ion-item-sliding *ngFor="let item of filteredFavorites">
      <ion-item class="exploration-list-item" [routerLink]="getRouterLink(item)" detail="true" button>
        <div class="letter-thumb" slot="start">{{ item.name | slice:0:1 }}</div>
        <ion-label class="ion-text-wrap">
          <h3>{{ item.name }}</h3>
          <p>{{ item.name_kana }}</p>
          <p *ngIf="item.description">{{ item.description | truncate:60 }}</p>
        </ion-label>
        <ion-icon
          [name]="item.type === 'sight' ? 'location-outline' : 'gift-outline'"
          slot="end"
          [color]="item.type === 'sight' ? 'primary' : 'secondary'">
        </ion-icon>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="removeFavorite(item)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

</ion-content>
